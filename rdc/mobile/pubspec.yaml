name: rdc_mobile
description: Remote Dev Control — Aplicativo Mobile
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP e WebSocket
  dio: ^5.4.3
  web_socket_channel: ^2.4.0
  http: ^1.2.2

  # State Management
  flutter_riverpod: ^2.5.1

  # Roteamento
  go_router: ^14.2.7

  # Código / Editor
  flutter_highlight: ^0.7.0

  # WebView (para Preview)
  webview_flutter: ^4.8.0

  # Armazenamento local
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  percent_indicator: ^4.2.3

  # Utilitários
  intl: ^0.19.0
  url_launcher: ^6.3.0
  uuid: ^4.4.2
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
